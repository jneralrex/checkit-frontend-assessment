name = "pokemon-explorer"
main = "dist/index.js"
compatibility_date = "2024-12-19"

[build]
command = "npm run build"
cwd = "."
watch_paths = ["src/**"]

[env.production]
routes = [
  { pattern = "pokemon-explorer.workers.dev", zone_name = "" }
]

[build.upload]
format = "modules"
main = "./dist/index.js"

[[build.upload.rules]]
type = "CompiledContentType"
globs = ["**/*.wasm"]
fallthrough = true

[[build.upload.rules]]
type = "Text"
globs = ["**/*.txt", "**/*.html"]
fallthrough = true

[cache_control]
max_age = 3600
s_max_age = 86400

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "pokemon-explorer-assets"
preview_bucket_name = "pokemon-explorer-assets-preview"
jurisdiction = "eu"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
